<script>
    document.addEventListener("DOMContentLoaded", function() {
        const textElement = document.querySelector('.typed-text');
        const textToType = textElement.getAttribute('data-text');
        if (!textToType) return;
        let index = 0;
        function type() {
            if (index < textToType.length) {
                textElement.textContent += textToType.charAt(index);
                index++;
                setTimeout(type, 50 + Math.random() * 50);
            }
        }
        setTimeout(type, 250);
    });
</script>

<script>
    const themes = ["venom","carnage","black-suit","anti-venom","charcoal","amoled","gruvbox","dracula","nord","catppuccin"];
    const toggle = document.getElementById('theme-toggle');
    let currentTheme = document.documentElement.getAttribute('data-theme') || 'charcoal';

    if (themes.indexOf(currentTheme) === -1) {
        currentTheme = themes[0] || 'charcoal';
        if (currentTheme === 'charcoal') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }
        localStorage.setItem('theme', currentTheme);
    }
    
    toggle.textContent = `[${currentTheme}]`;

    toggle.addEventListener('click', () => {
        currentTheme = themes[(themes.indexOf(currentTheme) + 1) % themes.length];
        
        if (currentTheme === 'charcoal') {
            document.documentElement.removeAttribute('data-theme');
        } else {
            document.documentElement.setAttribute('data-theme', currentTheme);
        }
        
        localStorage.setItem('theme', currentTheme);
        toggle.textContent = `[${currentTheme}]`;
    });
</script>
